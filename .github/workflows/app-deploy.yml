name: App CI/CD

# End-to-end application pipeline, one explicit step at a time:
#   build → test → docker build → Trivy scan → push to ECR → deploy via SSM →
#   wait for health → functional (MCP) smoke test.
#
# Requires (set from the bootstrap outputs):
#   - Actions secrets:   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
# and assumes the infra (ECR + EC2) already exists (run infra.yml first).

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
      - "scripts/**"
      - ".github/workflows/app-deploy.yml"
  pull_request:
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPO: spring-mcp-server
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --------------------------------------------------------------------------
  # 1+2. Build and test (unit + Testcontainers integration incl. MCP handshake)
  # --------------------------------------------------------------------------
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build & run tests (mvn verify)
        run: ./mvnw -B verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # 3-8. Containerise, scan, push, deploy, verify. Only on main / manual.
  # --------------------------------------------------------------------------
  deploy:
    name: Dockerise, Scan, Push & Deploy
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 3 — Build Docker image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPO"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" .

      - name: 4 — Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          # Report HIGH/CRITICAL findings but don't block the demo deploy — the
          # remaining issues are unfixed/base-image OS CVEs. Set exit-code to "1"
          # to turn this into a hard gate once you maintain a hardened base image.
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: 5 — Push image to ECR
        run: |
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"
          echo "Pushed $IMAGE:$IMAGE_TAG"

      - name: 6 — Resolve deploy target (EC2 instance + endpoint)
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$ECR_REPO" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)
          PUBLIC_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$ECR_REPO" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" --output text)
          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "::error::No running EC2 instance tagged '$ECR_REPO'. Run the Infra workflow first."
            exit 1
          fi
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"
          echo "BASE_URL=http://$PUBLIC_IP" >> "$GITHUB_ENV"
          echo "Target instance: $INSTANCE_ID  endpoint: http://$PUBLIC_IP/mcp"

      - name: 7 — Deploy to EC2 via SSM
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy $ECR_REPO:$IMAGE_TAG" \
            --parameters commands="[
              \"set -euxo pipefail\",
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY\",
              \"docker pull $REGISTRY/$ECR_REPO:$IMAGE_TAG\",
              \"docker rm -f $ECR_REPO || true\",
              \"docker run -d --restart unless-stopped --name $ECR_REPO -p 80:8080 -e AWS_REGION=$AWS_REGION -e APP_DYNAMODB_TABLE=mcp-tasks $REGISTRY/$ECR_REPO:$IMAGE_TAG\",
              \"docker image prune -f\"
            ]" \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text)
          echo "Deploy status: $STATUS"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
          [ "$STATUS" = "Success" ]

      - name: 8 — Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "$BASE_URL/actuator/health" >/dev/null 2>&1; then
              echo "Healthy after ${i} attempts"; exit 0
            fi
            sleep 5
          done
          echo "::error::Service did not become healthy"; exit 1

      - name: 9 — Functional test (MCP smoke test)
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh "$BASE_URL"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deployment"
            echo ""
            echo "- **Image:** \`$IMAGE:$IMAGE_TAG\`"
            echo "- **MCP endpoint:** $BASE_URL/mcp"
            echo "- **Health:** $BASE_URL/actuator/health"
          } >> "$GITHUB_STEP_SUMMARY"
